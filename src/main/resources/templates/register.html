<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
    <title>The Burrow | Register</title>
</head>
<body class="terminal-body">
<div class="login-container">
    <h2 style="color: #00ff41;">[ NEW_VAULT_CREATION ]</h2>
    <p style="color: #ffffff; font-size: 0.7rem; margin-bottom: 20px;">SYSTEM: ENTER CREDENTIALS FOR ENCRYPTION</p>

    <form th:action="@{/register}" method="post">
        <div class="input-group">
            <span style="color: #ffffff;">USER:</span>
            <input type="text" name="username" placeholder="choose_username..." required autofocus>
        </div>

        <div class="input-group">
            <span style="color: #ffffff;">PASS:</span>
            <input type="password" name="password" placeholder="create_password..." required>
        </div>

        <br>
        <button type="submit" class="btn-retro" style="border-color: #00ff41; color: #00ff41;">[_INITIATE_SEQUENCE_]</button>
    </form>

    <br>
    <a href="/login" style="color: whitesmoke; text-decoration: none; font-size: 0.7rem;">
        < BACK_TO_LOGIN
    </a>
</div>
</body>
</html>
